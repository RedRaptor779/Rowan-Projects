<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced CSS</title>
    <link rel="stylesheet" type="text/css" href="lecture4style2.css">

<body>

    <nav>

    <div id="row-one">

    <table>
