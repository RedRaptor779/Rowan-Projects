    <!-- 
    what is responsive design?
    responsiveness or responsive design in web dev is an approach that means our website looks good 
    across different devices and screen sizes.
    
    How can we achieve this?
    we can achieve this by leveraging a "mobile first" design philosophy.
    
    absolute unites of measures
    (a measurement that is fixed in length)
    - pixels (px)

    relative units of measures
    (a measurement that is relative to another value, such as the size of the parent element or the viewport)
    - 1vw 

    Never use px - use em!
    em is relative to the current font size
    2.5em is 2.5 times the current font size
    -->

    <h2>This is a responsive design example</h2>

    <p class="paragraph-one">We are going to use a media query to apply different css styles based on screen width.</p>
