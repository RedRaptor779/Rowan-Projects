<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture 9 - Document Object Model</title>
</head>
<body>
    <h1>Lecture 9 - Document Object Model</h1>

     <p id="city-text">New York</p>


    <p id="new-york">New York City</p>
    <p id="sao-paulo">Sao Paulo</p>

    <button id="change-city">Change City</button>

    <p class="south-american-city">Buenos Aires</p>
    <p class="south-american-city">Lima</p>
    <p class="south-american-city">Bogota</p>

    <button id="change-south-american-cities">Change South American Cities</button>

    <h2> Travel Destinations </h2>
    <p>Tokyo</p>
    <p>Paris</p>
    <p>Rome</p>

    <h2> Travel Location Pt2</h2>
    <ul id="city-list2">
        <li>Tokyo</li>
        <li>Paris</li>
        <li>Rome</li>
    </ul>

    <input type="text" id="city-input" placeholder="Enter a city name">
    <button id="add-city">Add City</button>
    <button id="hscities">Hide/Show Cities</button>

    <script src="script.js"></script>
</body>
