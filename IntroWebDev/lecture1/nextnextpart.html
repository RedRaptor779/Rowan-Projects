<html>
<head>
    <title>Lecture 1 - Introduction to Web Development</title>
    <!-- lets do some basic css-->
     <style>
        div {
            background-color: cyan;
            text-align: end;
        }
     </style>
</head>
<body>
    <h2>Nested lists</h2>
    <ul>
        <li>Item 1
            <ul>
                <li>Subitem 1a</li>
                <li>Subitem 1b</li>
            </ul>
        </li>
        <li>Item 2
            <ol>
                <li>Subitem 2a</li>
                <li>Subitem 2b</li>
            </ol>
        </li>
    </ul>

    <h3>Divs</h3>

    <div>
        <h2>Capitals</h2>
        <p>Tokyo is the capital of Japan</p> <!-- child of div and sibling of H2-->
    </div>
</body>
</html>
